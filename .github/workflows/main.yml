name: YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      custom_command:
        description: 'Command to run'
        required: false
        type: string
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        pip install yt-dlp
        sudo apt-get update -qq
        sudo apt-get install -y ffmpeg
        
    - name: Handle custom command
      if: github.event.inputs.custom_command != ''
      run: |
        echo "${{ github.event.inputs.custom_command }}" >> commands.txt
        
    - name: Create directories
      run: |
        mkdir -p results
        mkdir -p results/downloads
        
    - name: Run YouTube Downloader
      env:
        YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        PYTHONUNBUFFERED: 1
      run: python scripts/youtube_downloader.py
      
    - name: Commit results
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "GitHub Actions"
        git add results/ commands.txt
        if git diff --staged --quiet; then
          echo "No changes"
        else
          git commit -m "📺 Update results [skip ci]"
          git push
        fi
