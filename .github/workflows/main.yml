name: YouTube Video Downloader

on:
  push:
    branches: [ main, master ]
    paths:
      - 'commands.txt'
  schedule:
    # Run daily at 2 AM UTC to avoid peak hours
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to run (search, download, recent, playlist)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp
        
    - name: Create results directory
      run: mkdir -p results downloads
        
    - name: Run YouTube Downloader
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd scripts
        python youtube_downloader.py
        
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add results/ downloads/ commands.txt
        git diff --staged --quiet || git commit -m "Update YouTube downloader results [skip ci]"
        git push
